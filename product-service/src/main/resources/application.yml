spring:
  application:
    name: product-service

  datasource:
    url: ${PRODUCT_DB_URL}
    username: ${PRODUCT_DB_USERNAME}
    password: ${PRODUCT_DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto:  update

    show-sql: true

   # properties:
   #   hibernate:
     #   format_sql: true

server:
  port: 8082

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka